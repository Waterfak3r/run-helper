name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android SDK
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p "$SDK"/cmdline-tools

          # Download Android command-line tools
          CMDLINE_URL=https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          echo "Downloading cmdline-tools..."
          curl -sL -o /tmp/cmdline-tools.zip "$CMDLINE_URL"
          unzip -q /tmp/cmdline-tools.zip -d "$SDK"/cmdline-tools
          mv "$SDK"/cmdline-tools/cmdline-tools "$SDK"/cmdline-tools/latest

          SDKMGR="$SDK"/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMGR --sdk_root="$SDK" --licenses
          $SDKMGR --sdk_root="$SDK" "build-tools;33.0.0" "platforms;android-31" "platform-tools"
      - name: Build APK
        run: yes | buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
