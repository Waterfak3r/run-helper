name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build APK
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk zip unzip autoconf libtool cmake libffi-dev libssl-dev zlib1g-dev
          pip install buildozer cython
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
