name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer
    steps:
      - uses: actions/checkout@v4
      - name: Setup SDK
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          # Try new layout (cmdline-tools/latest) first, fall back to old layout (tools)
          if [ -x "$SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMGR="$SDK/cmdline-tools/latest/bin/sdkmanager"
          elif [ -x "$SDK/tools/bin/sdkmanager" ]; then
            SDKMGR="$SDK/tools/bin/sdkmanager"
          else
            echo "ERROR: sdkmanager not found at expected paths"
            find "$SDK" -name sdkmanager 2>/dev/null || echo "SDK dir listing:" && ls -la "$SDK/" 2>/dev/null
            exit 1
          fi
          echo "Using sdkmanager: $SDKMGR"
          yes | $SDKMGR --sdk_root="$SDK" --licenses
          $SDKMGR --sdk_root="$SDK" "build-tools;33.0.0" "platforms;android-31" "platform-tools"
      - name: Build APK
        run: yes | buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
