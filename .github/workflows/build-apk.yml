name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Cache Buildozer state
        uses: actions/cache@v4
        with:
          path: |
            /github/home/.buildozer
            /github/home/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: 1
          BUILDOZER_WARN_ON_ROOT: 0
        run: yes | buildozer android debug
      - name: Dump Gradle diagnostics on failure
        if: failure()
        run: |
          DIST_DIR=".buildozer/android/platform/build-arm64-v8a/dists/runhelper"
          if [ -f "$DIST_DIR/build.gradle" ]; then
            echo "===== build.gradle ====="
            sed -n '1,240p' "$DIST_DIR/build.gradle"
          fi
          if [ -f "$DIST_DIR/gradle.properties" ]; then
            echo "===== gradle.properties ====="
            cat "$DIST_DIR/gradle.properties"
          fi
          if [ -f "$DIST_DIR/settings.gradle" ]; then
            echo "===== settings.gradle ====="
            cat "$DIST_DIR/settings.gradle"
          fi
          if [ -d "$DIST_DIR/build/reports" ]; then
            echo "===== Gradle reports ====="
            find "$DIST_DIR/build/reports" -maxdepth 3 -type f | sort
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          if-no-files-found: error
